name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: |
        cd app
        npm ci

    - name: Run tests
      run: |
        cd app
        npm test

    - name: Build Docker image
      run: docker build -t node-cicd-app .

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push image
      run: |
        docker tag node-cicd-app ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:latest

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: cd terraform && terraform init

    - name: Terraform Plan
      run: cd terraform && terraform plan
      env:
        TF_VAR_key_name: ${{ secrets.TF_VAR_KEY_NAME }}

    - name: Terraform Apply + Get EC2 IP
      id: terraform_apply
      run: |
        cd terraform
        terraform apply -auto-approve
        echo "EC2_IP=$(terraform output -raw public_ip)" >> $GITHUB_ENV
      env:
        TF_VAR_key_name: ${{ secrets.TF_VAR_KEY_NAME }}

    - name: Get EC2 IP
      id: terraform
      run: |
        cd terraform
        echo "EC2_IP=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT
      env:
        TF_VAR_key_name: ${{ secrets.TF_VAR_KEY_NAME }}

    - name: Wait for EC2 to be ready
      run: |
        for i in {1..60}; do
          if nc -z ${{ steps.terraform.outputs.EC2_IP }} 22; then
            echo "EC2 SSH port is open"
            exit 0
          fi
          echo "Waiting for EC2 SSH... (attempt $i/60)"
          sleep 5
        done
        echo "EC2 failed to become ready"
        exit 1

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ steps.terraform.outputs.EC2_IP }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo yum install -y docker || true
          sudo systemctl start docker || true

          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:latest
          sudo docker stop app || true
          sudo docker rm app || true
          sudo docker run -d -p 3000:3000 --name app ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:latest
